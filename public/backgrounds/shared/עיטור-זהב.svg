<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 744 1052" preserveAspectRatio="xMidYMid slice">
  <!-- עיטור זהב עדין: פינות מעוטרות, מרכז נקי לכיתוב. A5 portrait proportions. -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9a961"/>
      <stop offset="0.5" stop-color="#b08d57"/>
      <stop offset="1" stop-color="#8a6d3f"/>
    </linearGradient>
    <radialGradient id="paper" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#fdfbf5"/>
      <stop offset="1" stop-color="#f2ead6" stop-opacity="1"/>
    </radialGradient>
    <g id="corner">
      <path d="M28 170 Q28 28 170 28" fill="none" stroke="url(#gold)" stroke-width="3"/>
      <path d="M44 170 Q44 44 170 44" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
      <circle cx="28" cy="170" r="5" fill="url(#gold)"/>
      <circle cx="170" cy="28" r="5" fill="url(#gold)"/>
      <path d="M60 96 q18 -28 48 -36 q-12 24 -20 30 q22 -10 40 -8 q-20 16 -44 20 q-16 4 -24 -6z" fill="url(#gold)" opacity="0.85"/>
      <circle cx="120" cy="52" r="3" fill="url(#gold)" opacity="0.8"/>
      <circle cx="56" cy="120" r="3" fill="url(#gold)" opacity="0.8"/>
    </g>
  </defs>

  <rect width="744" height="1052" fill="#faf7f0"/>
  <rect width="744" height="1052" fill="url(#paper)" opacity="0.9"/>

  <!-- thin double frame -->
  <rect x="26" y="26" width="692" height="1000" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <rect x="38" y="38" width="668" height="976" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.65"/>

  <!-- four ornamental corners -->
  <use href="#corner"/>
  <use href="#corner" transform="translate(744,0) scale(-1,1)"/>
  <use href="#corner" transform="translate(0,1052) scale(1,-1)"/>
  <use href="#corner" transform="translate(744,1052) scale(-1,-1)"/>

  <!-- small center-top flourish -->
  <g transform="translate(372,64)" opacity="0.9">
    <path d="M-46 0 Q-20 -16 0 0 Q20 -16 46 0" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="0" cy="-4" r="4" fill="url(#gold)"/>
  </g>
  <!-- small center-bottom flourish -->
  <g transform="translate(372,988)" opacity="0.9">
    <path d="M-46 0 Q-20 16 0 0 Q20 16 46 0" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="0" cy="4" r="4" fill="url(#gold)"/>
  </g>
</svg>
